spec_meta:
  id: UNWIND-SIDECAR-SESS-PRINCIPAL-001
  title: Sidecar Session-to-Principal Mapping Design
  version: 1.0.0
  status: draft
  owner: SENTINEL
  generated_at_utc: "2026-02-23T04:08:00Z"

problem:
  context: "OpenClaw before_tool_call provides toolName/params plus optional sessionKey and agentId, but no principal/account identifier."
  risk: "UNWIND policy scoping, trust state, amber mediator, approval windows, and response-principal validation require stable principal_id."

decision_summary:
  selected_model: "Hybrid: explicit mapping API as authority + config bootstrap for known service identities; no implicit first-seen mapping in enforce mode."

resolution_order:
  - step: 1
    source: explicit_session_binding
    lookup: "(adapter_instance_id, session_key)"
    action_if_found: "Use bound principal_id."
  - step: 2
    source: config_rule_bootstrap
    lookup: "Ordered rules over session_key regex, agent_id, channel/profile metadata."
    action_if_found: "Create persisted auto-binding with source=config."
  - step: 3
    source: agent_default_rule
    lookup: "Exact agent_id -> principal_id for dedicated service agents only."
    action_if_found: "Create persisted binding with source=agent_default."
  - step: 4
    source: unresolved
    action:
      enforce_mode: "Block with SESSION_PRINCIPAL_UNBOUND."
      shadow_mode: "Allow + high-severity telemetry + trust downgrade."

normative_principles:
  - "principal_id resolution MUST be deterministic and auditable."
  - "Ambiguous or missing identity MUST fail closed in enforce mode."
  - "sessionKey binding changes MUST be explicit (no silent overwrite)."
  - "agentId and principal_id MUST remain separate identity domains."

data_model:
  tables:
    session_principal_bindings:
      key_fields: [binding_id, adapter_instance_id, session_key, principal_id, binding_generation, status, source, confidence, created_at, updated_at, last_seen_at, expires_at, created_by, rebind_reason]
      constraints:
        - "UNIQUE(adapter_instance_id, session_key, status='active')"
        - "binding_generation monotonic per (adapter_instance_id, session_key)"
    session_principal_binding_events:
      key_fields: [event_id, binding_id, event_type, actor, reason, metadata_json, created_at]

api_additions:
  - method: POST
    path: /v1/session-bindings
    purpose: "Create binding session_key -> principal_id"
  - method: POST
    path: /v1/session-bindings/rebind
    purpose: "Controlled principal change"
  - method: POST
    path: /v1/session-bindings/revoke
    purpose: "Revoke active binding"

failure_modes:
  - code: SESSION_PRINCIPAL_UNBOUND
    enforce_action: block
  - code: SESSION_KEY_MISSING
    enforce_action: block
  - code: SESSION_REBIND_REQUIRED
    enforce_action: block
  - code: SESSION_BINDING_STORE_UNAVAILABLE
    enforce_action: block
  - code: SESSION_BINDING_CONFLICT
    enforce_action: block

storage: "SQLite (same durability domain as event store) + in-memory LRU cache"
