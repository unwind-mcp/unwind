spec_meta:
  id: OPENCLAW-ADAPTER-FAILCLOSED-001
  name: UNWIND OpenClaw Adapter Fail-Closed Contract
  version: 1.0.0
  status: draft
  owner: SENTINEL
  generated_at_utc: "2026-02-23T02:08:00Z"

source_constraints:
  required_sources:
    - path: dist/plugin-sdk/plugins/types.d.ts
      constraints:
        - "Hook type signatures must match PluginHookHandlerMap."
        - "before_tool_call return type supports only params/block/blockReason (no native challenge type)."
    - path: dist/plugin-sdk/reply-CqKtVq5t.js
      constraints:
        - "before_tool_call hook exceptions are caught by OpenClaw runtime and default to continue tool execution (fail-open)."
        - "after_tool_call hook exceptions are caught/logged; they do not block executed tool calls."
      evidence_lines:
        - "runBeforeToolCallHook catches errors and returns blocked=false (around lines 59668-59707 in current dist build)."
        - "after_tool_call errors are caught and logged (around lines 63367+, 65679+ in current dist build)."

normative_language:
  - "MUST"
  - "MUST NOT"
  - "SHOULD"
  - "MAY"

openclaw_hook_contract:
  hook_capabilities:
    before_tool_call:
      supports:
        - allow (return undefined/void)
        - block (return { block: true, blockReason })
        - mutate (return { params })
      does_not_support:
        - challenge
        - async pending decision
    after_tool_call:
      supports:
        - non-blocking post-call telemetry/audit only
  critical_runtime_behavior:
    - "If before_tool_call handler throws, OpenClaw catches and continues tool execution."
    - "Therefore adapter handlers MUST catch all internal errors and return block from before_tool_call."

adapter_security_invariants:
  - "before_tool_call handler MUST NEVER throw."
  - "All exceptions inside before_tool_call MUST be caught and converted to { block: true, blockReason }."
  - "If adapter cannot prove an allow decision, it MUST block."
  - "Unknown/invalid/unparseable sidecar responses MUST block."
  - "Sidecar unhealthy/unknown health state MUST block."
  - "Challenge-required decisions MUST be mapped to block + out-of-band approval workflow."
  - "after_tool_call handler MUST swallow all exceptions (never throw)."

plugin_config_contract:
  schema:
    mode:
      type: string
      enum: ["off", "shadow", "enforce"]
      default: "enforce"
    sidecarUrl:
      type: string
      default: "http://127.0.0.1:9100"
    timeoutMs:
      type: integer
      default: 500
      minimum: 50
      maximum: 5000
      description: "Total decision request budget (connect + write + sidecar compute + response read + parse)."
    healthCheckIntervalMs:
      type: integer
      default: 5000
      minimum: 250
      maximum: 60000
    healthCheckTimeoutMs:
      type: integer
      default: 250
      minimum: 50
      maximum: 2000
    maxConsecutiveFailures:
      type: integer
      default: 3
      minimum: 1
      maximum: 20
    breakerOpenMs:
      type: integer
      default: 10000
      minimum: 500
      maximum: 300000
    startupRequireHealthy:
      type: boolean
      default: true
  fail_closed_config_rules:
    - "Invalid config parse MUST set adapter state=misconfigured and force block in before_tool_call."
    - "timeoutMs default MUST be 500ms if unspecified."
    - "mode=off is the only explicit non-enforcing mode; all other unknown mode values MUST block (misconfiguration)."

timeout_budgets:
  decision_path:
    total_timeout_ms:
      default: 500
      configurable_via: pluginConfig.timeoutMs
    budget_guidance:
      connect_and_tls: "<= 150ms (within total budget)"
      sidecar_compute: "<= 250ms (within total budget)"
      response_read_and_parse: "<= 100ms (within total budget)"
    on_timeout:
      action: block
      reason_code: SIDECAR_TIMEOUT
  health_check_path:
    interval_ms_default: 5000
    timeout_ms_default: 250
    on_timeout:
      action: "mark unhealthy; subsequent before_tool_call blocks"

handler_type_signatures:
  source: "dist/plugin-sdk/plugins/types.d.ts"
  exact_typescript:
    before_tool_call_handler: |
      type BeforeToolCallHandler = (
        event: PluginHookBeforeToolCallEvent,
        ctx: PluginHookToolContext
      ) =>
        | Promise<PluginHookBeforeToolCallResult | void>
        | PluginHookBeforeToolCallResult
        | void;
    after_tool_call_handler: |
      type AfterToolCallHandler = (
        event: PluginHookAfterToolCallEvent,
        ctx: PluginHookToolContext
      ) => Promise<void> | void;
    event_and_result_shapes: |
      type PluginHookBeforeToolCallEvent = {
        toolName: string;
        params: Record<string, unknown>;
      };

      type PluginHookBeforeToolCallResult = {
        params?: Record<string, unknown>;
        block?: boolean;
        blockReason?: string;
      };

      type PluginHookAfterToolCallEvent = {
        toolName: string;
        params: Record<string, unknown>;
        result?: unknown;
        error?: string;
        durationMs?: number;
      };

      type PluginHookToolContext = {
        agentId?: string;
        sessionKey?: string;
        toolName: string;
      };
  implementation_required_shape:
    before_tool_call: |
      export const beforeToolCall: PluginHookHandlerMap["before_tool_call"] = async (event, ctx) => {
        try {
          // compute decision
          // return { block: true, blockReason } | { params } | undefined
        } catch (err) {
          return {
            block: true,
            blockReason: "ADAPTER_INTERNAL_ERROR"
          };
        }
      };
    after_tool_call: |
      export const afterToolCall: PluginHookHandlerMap["after_tool_call"] = async (event, ctx) => {
        try {
          // telemetry only
        } catch {
          // swallow: never throw from hook
        }
      };

decision_flow_contract:
  before_tool_call:
    - step: "Validate adapter state/config"
      fail_action: "block"
    - step: "Check sidecar health/circuit state"
      fail_action: "block"
    - step: "Build canonical request envelope"
      fail_action: "block"
    - step: "Query sidecar decision endpoint with timeoutMs budget"
      fail_action: "block"
    - step: "Parse + validate sidecar response schema"
      fail_action: "block"
    - step: "Map sidecar decision"
      mapping:
        allow: "allow (or mutate params when explicitly returned and schema-valid)"
        block: "block"
        challenge_required: "block (with challenge reason + receipt)"
        unknown: "block"

error_to_block_mapping:
  - code: CONFIG_PARSE_FAILED
    layer: adapter
    trigger: "Plugin config missing/invalid/unparseable."
    return: { block: true, blockReason: "CONFIG_PARSE_FAILED" }
  - code: CONFIG_INVALID_VALUE
    layer: adapter
    trigger: "Config value outside allowed range."
    return: { block: true, blockReason: "CONFIG_INVALID_VALUE" }
  - code: MODE_UNKNOWN
    layer: adapter
    trigger: "mode not in off|shadow|enforce."
    return: { block: true, blockReason: "MODE_UNKNOWN" }
  - code: ADAPTER_NOT_INITIALIZED
    layer: adapter
    trigger: "Service startup incomplete or init race."
    return: { block: true, blockReason: "ADAPTER_NOT_INITIALIZED" }
  - code: HEALTH_UNKNOWN
    layer: health
    trigger: "No successful health confirmation yet when startupRequireHealthy=true."
    return: { block: true, blockReason: "SIDECAR_HEALTH_UNKNOWN" }
  - code: SIDECAR_UNHEALTHY
    layer: health
    trigger: "Health check says sidecar down/degraded/not-ready."
    return: { block: true, blockReason: "SIDECAR_UNHEALTHY" }
  - code: CIRCUIT_OPEN
    layer: health
    trigger: "Circuit breaker open after consecutive sidecar failures."
    return: { block: true, blockReason: "SIDECAR_CIRCUIT_OPEN" }
  - code: REQUEST_BUILD_FAILED
    layer: adapter
    trigger: "Failed constructing decision request envelope."
    return: { block: true, blockReason: "REQUEST_BUILD_FAILED" }
  - code: REQUEST_SERIALIZATION_FAILED
    layer: adapter
    trigger: "Failed JSON serialization."
    return: { block: true, blockReason: "REQUEST_SERIALIZATION_FAILED" }
  - code: SIDECAR_CONNECT_ERROR
    layer: transport
    trigger: "DNS/TCP/TLS/socket errors."
    return: { block: true, blockReason: "SIDECAR_CONNECT_ERROR" }
  - code: SIDECAR_TIMEOUT
    layer: transport
    trigger: "No complete decision response within timeoutMs."
    return: { block: true, blockReason: "SIDECAR_TIMEOUT" }
  - code: SIDECAR_HTTP_4XX
    layer: transport
    trigger: "Sidecar returned 4xx."
    return: { block: true, blockReason: "SIDECAR_HTTP_4XX" }
  - code: SIDECAR_HTTP_5XX
    layer: transport
    trigger: "Sidecar returned 5xx."
    return: { block: true, blockReason: "SIDECAR_HTTP_5XX" }
  - code: SIDECAR_EMPTY_BODY
    layer: response
    trigger: "Response body empty."
    return: { block: true, blockReason: "SIDECAR_EMPTY_BODY" }
  - code: SIDECAR_INVALID_JSON
    layer: response
    trigger: "Response not valid JSON."
    return: { block: true, blockReason: "SIDECAR_INVALID_JSON" }
  - code: SIDECAR_SCHEMA_INVALID
    layer: response
    trigger: "Required fields missing/wrong type."
    return: { block: true, blockReason: "SIDECAR_SCHEMA_INVALID" }
  - code: SIDECAR_DECISION_MISSING
    layer: response
    trigger: "No decision field."
    return: { block: true, blockReason: "SIDECAR_DECISION_MISSING" }
  - code: SIDECAR_DECISION_UNKNOWN
    layer: response
    trigger: "Decision not in allow|block|challenge_required."
    return: { block: true, blockReason: "SIDECAR_DECISION_UNKNOWN" }
  - code: SIDECAR_DECISION_CONFLICT
    layer: response
    trigger: "Contradictory response fields."
    return: { block: true, blockReason: "SIDECAR_DECISION_CONFLICT" }
  - code: MUTATION_INVALID
    layer: response
    trigger: "Mutate payload not Record<string, unknown>."
    return: { block: true, blockReason: "MUTATION_INVALID" }
  - code: CHALLENGE_PAYLOAD_INVALID
    layer: challenge
    trigger: "challenge_required without valid metadata."
    return: { block: true, blockReason: "CHALLENGE_PAYLOAD_INVALID" }
  - code: APPROVAL_GRANT_LOOKUP_FAILED
    layer: challenge
    trigger: "Could not verify approval grant."
    return: { block: true, blockReason: "APPROVAL_GRANT_LOOKUP_FAILED" }
  - code: APPROVAL_GRANT_EXPIRED
    layer: challenge
    trigger: "Grant expired."
    return: { block: true, blockReason: "APPROVAL_GRANT_EXPIRED" }
  - code: APPROVAL_GRANT_MISMATCH
    layer: challenge
    trigger: "Hash/principal/tool mismatch."
    return: { block: true, blockReason: "APPROVAL_GRANT_MISMATCH" }
  - code: APPROVAL_GRANT_REUSED
    layer: challenge
    trigger: "One-time grant already consumed."
    return: { block: true, blockReason: "APPROVAL_GRANT_REUSED" }
  - code: INTERNAL_EXCEPTION
    layer: adapter
    trigger: "Any unexpected exception."
    return: { block: true, blockReason: "ADAPTER_INTERNAL_EXCEPTION" }

block_on_uncertainty_rules:
  - "Uncertainty is any state where allow cannot be proven."
  - "On uncertainty, adapter MUST return block."
  - "If multiple interpretations possible, choose strictest (block)."
  - "If sidecar decision and local guard checks disagree, choose block."

challenge_workflow_contract:
  problem_statement: "OpenClaw hooks provide allow/block/mutate only; no native challenge/pause."
  design: "Map challenge to block + out-of-band approval."
  adapter_mapping:
    allow: "return undefined (or params mutation)"
    block: "return { block: true, blockReason }"
    challenge_required: "return { block: true, blockReason: 'AMBER_CHALLENGE_REQUIRED:<challenge_id>' }"

health_check_contract:
  health_endpoint:
    method: GET
    path: /health
    expected_http: 200
    healthy_when:
      - "status == 'ok'"
      - "policy_loaded == true"
      - "decision_engine_ready == true"
  state_machine:
    states: ["unknown", "healthy", "degraded", "down", "misconfigured"]
    startup:
      default_state: unknown
      rule: "If startupRequireHealthy=true, unknown behaves as block-until-healthy."
  circuit_breaker:
    opens_after_consecutive_failures: 3
    open_duration_ms_default: 10000

compliance_tests:
  required_tests:
    - id: FC-001
      name: before_handler_never_throws
    - id: FC-002
      name: timeout_blocks
    - id: FC-003
      name: malformed_response_blocks
    - id: FC-004
      name: challenge_maps_to_block
    - id: FC-005
      name: approved_retry_allows_once
    - id: FC-006
      name: health_down_blocks
    - id: FC-007
      name: after_handler_swallows_errors
